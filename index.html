<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Грузия — расписание 1–8 мая</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --surface2: #232d3b;
      --border: #2e3a4d;
      --text: #e8ecf1;
      --muted: #8b9cb3;
      --accent: #c41e3a;
      --accent-dim: rgba(196, 30, 58, 0.15);
      --gold: #d4a84b;
      --gold-dim: rgba(212, 168, 75, 0.12);
      --green: #2d6a4f;
      --radius: 12px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(196, 30, 58, 0.18), transparent),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(45, 106, 79, 0.12), transparent);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    header {
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .search {
      flex: 1 1 200px;
      min-width: 160px;
    }

    .search input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
    }

    .search input::placeholder {
      color: var(--muted);
    }

    .search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .day-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .day-tabs button {
      font: inherit;
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .day-tabs button:hover {
      background: var(--surface2);
      border-color: var(--muted);
    }

    .day-tabs button[aria-pressed="true"] {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }

    .day-tabs button.all {
      border-color: var(--gold);
      color: var(--gold);
    }

    .day-tabs button.all[aria-pressed="true"] {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }

    .stats {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .day-block {
      margin-bottom: 2rem;
    }

    .day-block h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--green);
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .day-block h2 .badge {
      font-size: 0.75rem;
      font-weight: 500;
      background: var(--surface2);
      color: var(--muted);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
    }

    .timeline {
      position: relative;
      padding-left: 0;
    }

    .event {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: 0.75rem 1rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }

    .event:last-child {
      border-bottom: none;
    }

    .event-time {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--gold);
      padding-top: 0.15rem;
    }

    .event-body {
      min-width: 0;
    }

    .event-program {
      margin: 0;
      font-size: 0.95rem;
    }

    .event-cost {
      margin: 0.4rem 0 0;
      font-size: 0.85rem;
      color: var(--muted);
      padding-left: 0.65rem;
      border-left: 3px solid var(--accent);
    }

    .event-cost:empty {
      display: none;
    }

    .event.hidden {
      display: none;
    }

    .day-block.hidden {
      display: none;
    }

    .jump-top {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .jump-top.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .jump-top:hover {
      border-color: var(--accent);
    }

    .event.event--detail {
      cursor: pointer;
      border-radius: var(--radius);
      margin: 0 -0.35rem;
      padding-left: 0.35rem;
      padding-right: 0.35rem;
    }

    .event.event--detail:hover {
      background: var(--surface2);
    }

    .event.event--detail:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .place-modal[hidden] {
      display: none !important;
    }

    .place-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0.75rem;
    }

    @media (min-width: 640px) {
      .place-modal {
        align-items: center;
      }
    }

    .place-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      cursor: pointer;
    }

    .place-modal-panel {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      max-height: min(92vh, 720px);
      overflow: auto;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      padding: 1rem 1rem 1.1rem;
    }

    .place-modal-close {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
    }

    .place-modal-close:hover {
      border-color: var(--accent);
    }

    .place-modal-panel h3 {
      margin: 0 2.25rem 0.65rem 0;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--gold);
    }

    .place-slider {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.35rem;
      align-items: center;
      margin-bottom: 0.35rem;
    }

    .place-slider-view {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
      aspect-ratio: 16 / 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .place-slider-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .place-slider-prev,
    .place-slider-next {
      font: inherit;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0;
    }

    .place-slider-prev:hover,
    .place-slider-next:hover {
      border-color: var(--accent);
    }

    .place-slider-prev:disabled,
    .place-slider-next:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .place-slider-counter {
      margin: 0 0 0.65rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    .place-modal-body p {
      margin: 0 0 0.65rem;
      font-size: 0.9rem;
      color: var(--text);
    }

    .place-modal-body p:last-child {
      margin-bottom: 0;
    }

    .place-modal-tips {
      margin-top: 1rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--border);
    }

    .place-modal-tips h4 {
      margin: 0 0 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gold);
    }

    .place-modal-tips ul {
      margin: 0;
      padding: 0 0 0 1.1rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .place-modal-tips li {
      margin-bottom: 0.4rem;
    }

    .place-modal-tips li:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 520px) {
      .event {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }

      .event-time {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

      <h1>Грузия — поездка</h1>
      <p id="subtitle">Программа времяпровождения в Грузии с 1 мая по 8 мая (7 мая Алматы). Фильтр по дням и поиск по всему тексту.</p>

        <div class="place-slider-view">

        </div>
        <button type="button" class="place-slider-next" id="place-slider-next" aria-label="Следующее фото">›</button>
      </div>
      <p class="place-slider-counter" id="place-slider-counter"></p>
      <div id="place-modal-body" class="place-modal-body"></div>
    </div>
  </div>

  <script>
    (function () {
      const raw = JSON.parse(document.getElementById("data").textContent);
      const items = raw.map(function (row, i) {
        row._i = i;
        return row;
      });
      const scheduleEl = document.getElementById("schedule");

      const placeNext = document.getElementById("place-slider-next");

      const days = [...new Set(items.map((i) => i.day))].sort((a, b) => a - b);
      let filterDay = null;

      function norm(s) {
        return (s || "").toLowerCase();
      }

      function matchesQuery(item, q) {
        if (!q.trim()) return true;
        const n = norm(q);
        return (
          norm(item.program).includes(n) ||
          norm(item.cost).includes(n) ||
          norm(item.title).includes(n) ||
          norm(item.label).includes(n) ||
          norm(item.time).includes(n)
        );
      }

      function render() {
        const q = qEl.value;
        const byDay = {};
        days.forEach((d) => {
          byDay[d] = [];
        });
        items.forEach((item) => {
          if (filterDay !== null && item.day !== filterDay) return;
          if (!matchesQuery(item, q)) return;
          byDay[item.day].push(item);
        });

        let html = "";
        let totalShown = 0;
        days.forEach((d) => {
          const list = byDay[d];
          if (!list.length) return;
          totalShown += list.length;
          const first = list[0];
          html += `<section class="day-block" data-day="${d}" id="day-${d}">`;
          html += `<h2>${first.title} <span class="badge">${list.length} пункта</span></h2>`;
          html += `<div class="timeline">`;
          list.forEach((ev) => {
            const costHtml = ev.cost
              ? `<p class="event-cost">${escapeHtml(ev.cost)}</p>`
              : "";
            const hasExtra =
              window.EVENT_PLACES &&
              window.EVENT_PLACES[ev._i] != null;
            const detailClass = hasExtra ? " event event--detail" : " event";
            const extraAttrs = hasExtra
              ? ` data-i="${ev._i}" tabindex="0" role="button" aria-label="Подробнее о пункте"`
              : "";
            html += `<article class="${detailClass.trim()}" data-day="${ev.day}"${extraAttrs}>`;
            html += `<div class="event-time">${escapeHtml(ev.time)}</div>`;
            html += `<div class="event-body">`;
            html += `<p class="event-program">${escapeHtml(ev.program)}</p>`;
            html += costHtml;
            html += `</div></article>`;
          });
          html += `</div></section>`;
        });

        if (!html) {
          scheduleEl.innerHTML =
            '<p class="empty">Ничего не найдено. Смените день или очистите поиск.</p>';
        } else {
          scheduleEl.innerHTML = html;
        }

        const totalAll = items.filter(
          (i) => filterDay === null || i.day === filterDay
        ).length;
        const filtered = items.filter(
          (i) =>
            (filterDay === null || i.day === filterDay) && matchesQuery(i, q)
        ).length;
        if (q.trim()) {
          statsEl.textContent = `Показано ${filtered} из ${totalAll} пунктов`;
        } else if (filterDay !== null) {
          statsEl.textContent = `День ${filterDay}: ${filtered} пунктов`;
        } else {
          statsEl.textContent = `Всего ${items.length} пунктов в программе`;
        }
      }

      function escapeHtml(t) {
        const div = document.createElement("div");
        div.textContent = t;
        return div.innerHTML;
      }

      function placeImagePaths(index) {
        const list =
          window.EVENT_IMAGES &&
          window.EVENT_IMAGES[index] &&
          window.EVENT_IMAGES[index].length
            ? window.EVENT_IMAGES[index]
            : [];
        return list.slice();
      }

      let modalSlide = 0;
      let modalImages = [];

      function updatePlaceSlider() {
        if (!modalImages.length) return;
        modalSlide = (modalSlide + modalImages.length) % modalImages.length;
        placeImg.src = modalImages[modalSlide];
        placeImg.alt = placeTitle.textContent || "Фото";
        placeCounter.textContent =
          modalImages.length > 1
            ? modalSlide + 1 + " / " + modalImages.length
            : "";
        placePrev.disabled = modalImages.length < 2;
        placeNext.disabled = modalImages.length < 2;
      }

      function openPlaceModal(index) {
        const extra =
          window.EVENT_PLACES && window.EVENT_PLACES[index]
            ? window.EVENT_PLACES[index]
            : null;
        if (!extra) return;
        placeTitle.textContent = extra.title || "Справка";
        let bodyHtml = (extra.paragraphs || [])
          .map(function (p) {
            return "<p>" + escapeHtml(p) + "</p>";
          })
          .join("");
        const tips = extra.tips && extra.tips.length ? extra.tips : [];
        if (tips.length) {
          bodyHtml +=
            '<div class="place-modal-tips"><h4>Советы и лайфхаки</h4><ul role="list">';
          tips.forEach(function (t) {
            bodyHtml += "<li>" + escapeHtml(t) + "</li>";
          });
          bodyHtml += "</ul></div>";
        }
        placeBody.innerHTML = bodyHtml;
        modalImages = placeImagePaths(index);
        if (!modalImages.length) {
          modalImages = ["places/caucasus-landscape.jpg"];
        }
        modalSlide = 0;
        placeModal.hidden = false;
        placeModal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        updatePlaceSlider();
        placeModal.querySelector(".place-modal-close").focus();
      }

      function closePlaceModal() {
        placeModal.hidden = true;
        placeModal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        placeImg.removeAttribute("src");
      }

      scheduleEl.addEventListener("click", function (e) {
        const art = e.target.closest(".event.event--detail");
        if (!art) return;
        const i = parseInt(art.getAttribute("data-i"), 10);
        if (!window.EVENT_PLACES || !window.EVENT_PLACES[i]) return;
        openPlaceModal(i);
      });

      scheduleEl.addEventListener("keydown", function (e) {
        if (e.key !== "Enter" && e.key !== " ") return;
        const art = e.target.closest(".event.event--detail");
        if (!art) return;
        e.preventDefault();
        const i = parseInt(art.getAttribute("data-i"), 10);
        if (!window.EVENT_PLACES || !window.EVENT_PLACES[i]) return;
        openPlaceModal(i);
      });

      placeModal.addEventListener("click", function (e) {
        if (e.target.hasAttribute("data-place-close")) closePlaceModal();
      });

      placePrev.addEventListener("click", function () {
        modalSlide -= 1;
        updatePlaceSlider();
      });

      placeNext.addEventListener("click", function () {
        modalSlide += 1;
        updatePlaceSlider();
      });

      document.addEventListener("keydown", function (e) {
        if (placeModal.hidden) return;
        if (e.key === "Escape") {
          e.preventDefault();
          closePlaceModal();
        } else if (e.key === "ArrowLeft" && modalImages.length > 1) {
          modalSlide -= 1;
          updatePlaceSlider();
        } else if (e.key === "ArrowRight" && modalImages.length > 1) {
          modalSlide += 1;
          updatePlaceSlider();
        }
      });

      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.className = "all";
      allBtn.textContent = "Все дни";
      allBtn.setAttribute("role", "tab");
      allBtn.setAttribute("aria-pressed", "true");
      allBtn.addEventListener("click", () => {
        filterDay = null;
        updateTabs();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      tabsEl.appendChild(allBtn);

      days.forEach((d) => {
        const btn = document.createElement("button");
        btn.type = "button";
        const label = items.find((i) => i.day === d).label;
        btn.textContent = `День ${d} · ${label}`;
        btn.setAttribute("role", "tab");
        btn.setAttribute("aria-pressed", "false");
        btn.addEventListener("click", () => {
          filterDay = d;
          updateTabs();
          render();
          const el = document.getElementById("day-" + d);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
        tabsEl.appendChild(btn);
      });

      function updateTabs() {
        const buttons = tabsEl.querySelectorAll("button");
        buttons.forEach((b, i) => {
          if (i === 0) {
            b.setAttribute("aria-pressed", filterDay === null ? "true" : "false");
          } else {
            const d = days[i - 1];
            b.setAttribute("aria-pressed", filterDay === d ? "true" : "false");
          }
        });
      }

      qEl.addEventListener("input", render);
      qEl.addEventListener("search", render);

      window.addEventListener("scroll", () => {
        topBtn.classList.toggle("visible", window.scrollY > 400);
      });
      topBtn.addEventListener("click", () =>
        window.scrollTo({ top: 0, behavior: "smooth" })
      );

      render();
    })();
  </script>
</body>
</html>
